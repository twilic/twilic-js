name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.18.1

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Oxfmt check
        run: pnpm fmt:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.18.1

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Oxlint
        run: pnpm lint

  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Resolve twilic-rust ref
        id: twilic_rust_ref
        run: |
          ref=$(grep -v '^#' .github/twilic-rust-ref | grep -v '^[[:space:]]*$' | head -1)
          test -n "$ref"
          echo "value=$ref" >> "$GITHUB_OUTPUT"

      - name: Checkout twilic-rust
        run: |
          set -euo pipefail
          dest="${{ github.workspace }}/../twilic-rust"
          ref="${{ steps.twilic_rust_ref.outputs.value }}"
          rm -rf "$dest"
          git init "$dest"
          git -C "$dest" remote add origin https://github.com/twilic/twilic-rust.git
          git -C "$dest" fetch --depth 1 origin "$ref"
          git -C "$dest" checkout --detach FETCH_HEAD

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.18.1

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Setup wasm-pack
        uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
        with:
          # Pin wasm-pack: action default "latest" can be 0.9.x, which does not support `build:wasm` --no-opt.
          version: v0.13.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Confirm build artifacts are not committed
        run: test -z "$(git ls-files '*.node' 'wasm/**/*.wasm' 2>/dev/null)"

      - name: Build WASM
        run: pnpm build:wasm

      - name: Build native addon
        run: pnpm build:napi

      - name: Verify npm pack contents
        run: pnpm build:ts && pnpm verify:pack

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

  test-wasm:
    name: Test WASM build and runtime
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Resolve twilic-rust ref
        id: twilic_rust_ref
        run: |
          ref=$(grep -v '^#' .github/twilic-rust-ref | grep -v '^[[:space:]]*$' | head -1)
          test -n "$ref"
          echo "value=$ref" >> "$GITHUB_OUTPUT"

      - name: Checkout twilic-rust
        run: |
          set -euo pipefail
          dest="${{ github.workspace }}/../twilic-rust"
          ref="${{ steps.twilic_rust_ref.outputs.value }}"
          rm -rf "$dest"
          git init "$dest"
          git -C "$dest" remote add origin https://github.com/twilic/twilic-rust.git
          git -C "$dest" fetch --depth 1 origin "$ref"
          git -C "$dest" checkout --detach FETCH_HEAD

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.18.1

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Setup wasm-pack
        uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
        with:
          version: v0.13.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build WASM
        run: pnpm build:wasm

      - name: Verify WASM artifacts
        run: |
          test -f wasm/pkg/twilic_wasm.js
          test -f wasm/pkg/twilic_wasm_bg.wasm

      - name: Build TypeScript
        run: pnpm build:ts

      - name: Run WASM tests
        run: node --test --test-concurrency=1 "tests/wasm.test.mjs"
