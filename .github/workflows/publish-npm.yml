name: Publish NPM

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.1.0)"
        required: true

permissions:
  contents: read

jobs:
  build-native:
    name: Build native (${{ matrix.platform }}-${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: windows-latest
            platform: win32
            arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
          persist-credentials: false

      - name: Resolve twilic-rust ref
        id: twilic_rust_ref
        run: |
          ref=$(grep -v '^#' .github/twilic-rust-ref | grep -v '^[[:space:]]*$' | head -1)
          test -n "$ref"
          echo "value=$ref" >> "$GITHUB_OUTPUT"

      - name: Checkout twilic-rust
        run: |
          set -euo pipefail
          dest="${{ github.workspace }}/../twilic-rust"
          ref="${{ steps.twilic_rust_ref.outputs.value }}"
          rm -rf "$dest"
          git init "$dest"
          git -C "$dest" remote add origin https://github.com/twilic/twilic-rust.git
          git -C "$dest" fetch --depth 1 origin "$ref"
          git -C "$dest" checkout --detach FETCH_HEAD

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.18.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native addon
        run: pnpm build:napi

      - name: Upload native artifact
        uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.platform }}-${{ matrix.arch }}
          path: native/twilic_napi-${{ matrix.platform }}-${{ matrix.arch }}.node

  build-package:
    name: Build npm package tarball
    runs-on: ubuntu-latest
    needs: build-native
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
          persist-credentials: false
          fetch-depth: 0

      - name: Resolve twilic-rust ref
        id: twilic_rust_ref
        run: |
          ref=$(grep -v '^#' .github/twilic-rust-ref | grep -v '^[[:space:]]*$' | head -1)
          test -n "$ref"
          echo "value=$ref" >> "$GITHUB_OUTPUT"

      - name: Checkout twilic-rust
        run: |
          set -euo pipefail
          dest="${{ github.workspace }}/../twilic-rust"
          ref="${{ steps.twilic_rust_ref.outputs.value }}"
          rm -rf "$dest"
          git init "$dest"
          git -C "$dest" remote add origin https://github.com/twilic/twilic-rust.git
          git -C "$dest" fetch --depth 1 origin "$ref"
          git -C "$dest" checkout --detach FETCH_HEAD

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.18.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Setup wasm-pack
        uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
        with:
          version: v0.13.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag and package version
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          RELEASE_TAG="${INPUT_TAG:-$REF_NAME}"
          node ./scripts/verify-tag-version.mjs "$RELEASE_TAG"

      - name: Verify release tag is on main
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          git merge-base --is-ancestor HEAD origin/main

      - name: Download all native artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: native-*
          path: native
          merge-multiple: true

      - name: Build wasm and TypeScript
        run: pnpm build:wasm && pnpm build:ts

      - name: Verify npm pack contents
        run: pnpm verify:pack

      - name: Create npm tarball
        run: |
          set -euo pipefail
          mkdir -p release
          npm pack --pack-destination release --ignore-scripts
          test "$(find release -maxdepth 1 -name '*.tgz' | wc -l)" -eq 1

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: release/*.tgz
          if-no-files-found: error

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build-package
    environment: npm-publish
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
          persist-credentials: false

      - name: Download npm package artifact
        uses: actions/download-artifact@v8
        with:
          name: npm-package
          path: release

      - name: Setup Node.js for OIDC publish
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # Trusted publishing (OIDC): requires npm CLI >= 11.5.1 (see npm trusted-publishers docs).
      # Configure the package on npmjs.com: Settings → Trusted Publisher → GitHub Actions
      # (repository twilic/twilic-js, workflow file publish-npm.yml, environment npm-publish).
      # Configure the `npm-publish` environment in GitHub with required reviewers.
      - name: Ensure npm CLI for OIDC trusted publishing
        run: npm install -g "npm@^11.5.1"

      - name: Publish to npm
        run: npm publish release/*.tgz --access public --provenance
