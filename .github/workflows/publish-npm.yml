name: Publish NPM

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.1.0)"
        required: true

permissions:
  contents: read

jobs:
  build-native:
    name: Build native (${{ matrix.platform }}-${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: windows-latest
            platform: win32
            arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
          persist-credentials: false

      - name: Checkout twilic-rust
        run: git clone --depth 1 https://github.com/twilic/twilic-rust.git "${{ github.workspace }}/../twilic-rust"

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.18.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native addon
        run: pnpm build:napi

      - name: Upload native artifact
        uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.platform }}-${{ matrix.arch }}
          path: native/twilic_napi-${{ matrix.platform }}-${{ matrix.arch }}.node

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build-native
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
          persist-credentials: false

      - name: Checkout twilic-rust
        run: git clone --depth 1 https://github.com/twilic/twilic-rust.git "${{ github.workspace }}/../twilic-rust"

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.18.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Setup wasm-pack
        uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
        with:
          version: v0.13.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag and package version
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          RELEASE_TAG="${INPUT_TAG:-$REF_NAME}"
          node ./scripts/verify-tag-version.mjs "$RELEASE_TAG"

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: native
          merge-multiple: true

      - name: Build wasm and TypeScript
        run: pnpm build:wasm && pnpm build:ts

      # Trusted publishing (OIDC): requires npm CLI >= 11.5.1 (see npm trusted-publishers docs).
      # Configure the package on npmjs.com: Settings → Trusted Publisher → GitHub Actions
      # (repository twilic/twilic-js, workflow file publish-npm.yml).
      - name: Ensure npm CLI for OIDC trusted publishing
        run: npm install -g "npm@^11.5.1"

      - name: Publish to npm
        run: npm publish --access public --provenance
